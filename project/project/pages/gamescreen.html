<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamescreen</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="../script/script.js" defer></script>
</head>
<body>
        <div id="temp-winLoose">
            <div class="btn" id="win" onclick="win()"></div>
            <div class="btn" id="loose" onclick="loose()"></div>
        </div>

        <div id="playerBox">
            <img src="#" alt="" id="spriteImg">
        </div>

        <div id="win-container">
            <p>Level Up!</p>
            <img src="#" alt="Winners Icon">
            <div id="win-btnContainer">
                <div class="win-btn">Go back!</div>
                <div class="win-btn">Next Level</div>
            </div>
        </div>

        <div id="loose-container">
            <p>Game over</p>
            <img src="#" alt="loose Icon">
            <div id="loose-btnContainer">
                <div class="loose-btn">Go back!</div>
                <div class="loose-btn">play again</div>
            </div>
        </div>
</body>
</html>
